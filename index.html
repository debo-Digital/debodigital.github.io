<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>debo Digital</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background-color: #ffffff;
    color: #1c1c1c;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  h1 {
    font-size: 3rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    margin: 0;
  }

  footer {
    background-color: #f2f2f2;
    color: #1c1c1c;
    text-align: center;
    padding: 0.5rem;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.03em;
  }

  footer p {
    margin: 0;
  }
</style>
</head>
<body>

<main>
  <h1>debo Digital</h1>
</main>

<footer>
  <p>&copy; <span id="year"></span> debo Digital. All rights reserved.</p>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
